server:
  port: 8000

# SPRING
spring:
  application:
    name: biznopay
  h2:
    console.enabled: true
  jpa:
    hibernate:
      ddl-auto: update #// Never take it to production
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
  datasource:
    url: "jdbc:h2:file:~/spring-boot-h2-db"
    driver-class-name: org.h2.Driver
    username: "sa"
    password: "password"