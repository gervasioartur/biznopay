server:
  port: 8000
  url: ${SERVER_URL:http://localhost:8000}

spring:
  application:
    name: biznopay
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always