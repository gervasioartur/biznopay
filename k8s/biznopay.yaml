apiVersion: v1
kind: Namespace
metadata:
  name: biznopay

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: biznopay
  namespace: biznopay
  labels:
    app: biznopay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: biznopay
  template:
    metadata:
      labels:
        app: biznopay
    spec:
      containers:
        - name: biznopay
          image: gervasioartur/biznopay:IMAGE_TAG
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: biznopay-secrets
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---

apiVersion: v1
kind: Service
metadata:
  name: biznopay-service
  namespace: biznopay
spec:
  selector:
    app: biznopay
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30000
  type: NodePort